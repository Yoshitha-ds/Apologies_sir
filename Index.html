<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Really Sorry ❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(-45deg, #ff9a9e, #fecfef, #fbc2eb, #a18cd1, #ff9a9e);
    background-size: 400% 400%;
    animation: gradientFlow 12s ease infinite;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @keyframes gradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .heart {
    position: absolute;
    bottom: -50px;
    font-size: 24px;
    opacity: 0.85;
    animation: floatUp linear infinite;
    user-select: none;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 50px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
  }

  .card:hover {
    transform: scale(1.02);
  }

  .message {
    font-size: 26px;
    font-weight: 700;
    color: #d6336c;
    margin-bottom: 12px;
    transition: all 0.3s ease;
  }

  .submessage {
    font-size: 16px;
    color: #555;
    margin-bottom: 35px;
    transition: all 0.3s ease;
  }

  .buttons {
    position: relative;
    display: flex;
    gap: 20px;
    justify-content: center;
    min-height: 70px;
    align-items: center;
  }

  button {
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 700;
    font-family: inherit;
    transition: all 0.15s ease;
  }

  #yesBtn {
    background: linear-gradient(135deg, #ff6b9d, #d6336c);
    color: white;
    padding: 16px 32px;
    font-size: 16px;
    box-shadow: 0 8px 20px rgba(214, 51, 108, 0.4);
  }

  #yesBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 28px rgba(214, 51, 108, 0.55);
  }

  #yesBtn:active {
    transform: scale(0.97);
  }

  #noBtn {
    background: #e9ecef;
    color: #555;
    padding: 16px 32px;
    font-size: 16px;
    position: absolute;
  }

  .status {
    margin-top: 20px;
    font-size: 14px;
    min-height: 20px;
    color: #888;
  }

  .success-screen {
    display: none;
    text-align: center;
  }

  .success-screen.show {
    display: block;
    animation: popIn 0.4s ease;
  }

  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .success-emoji {
    font-size: 60px;
    margin-bottom: 10px;
  }

  .success-text {
    font-size: 24px;
    font-weight: 700;
    color: #d6336c;
  }

  .success-sub {
    font-size: 15px;
    color: #777;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div id="heartsContainer"></div>

<div class="card">
  <div id="mainContent">
    <div class="message" id="message">I'm really sorry ❤️</div>
    <div class="submessage" id="submessage">Please forgive me 🥺</div>

    <div class="buttons" id="buttonsRow">
      <button id="yesBtn">Okay baby, I forgive you 💖</button>
      <button id="noBtn">No, I'm still angry 😠</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="success-screen" id="successScreen">
    <div class="success-emoji">🎉</div>
    <div class="success-text">Yay! Thank you for forgiving me!</div>
    <div class="success-sub">I really mean it. I love you ❤️</div>
  </div>
</div>

<script>
  // ---- Your Formspree endpoint (already set) ----
  const FORMSPREE_ENDPOINT = "https://formspree.io/f/xbdvlzdk";
  // -------------------------------------------------

  // Floating hearts background
  const heartsContainer = document.getElementById('heartsContainer');
  const heartEmojis = ['❤️', '💖', '💕', '💗', '💝'];

  function spawnHeart() {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (16 + Math.random() * 20) + 'px';
    const duration = 6 + Math.random() * 6;
    heart.style.animationDuration = duration + 's';
    heartsContainer.appendChild(heart);
    setTimeout(() => heart.remove(), duration * 1000);
  }
  setInterval(spawnHeart, 400);
  for (let i = 0; i < 8; i++) setTimeout(spawnHeart, i * 200);

  // No button dodge logic
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.getElementById('yesBtn');
  const buttonsRow = document.getElementById('buttonsRow');
  const message = document.getElementById('message');
  const submessage = document.getElementById('submessage');

  const taunts = [
    "NOPE! ✨",
    "Try again! 😏",
    "Catch me if you can!",
    "Not today! 💨",
    "Nice try! 😜",
    "Almost! 🏃",
    "Nuh-uh! 🙅"
  ];

  const escalatingMessages = [
    { msg: "I'm really sorry ❤️", sub: "Please forgive me 🥺" },
    { msg: "I'm so sorry baby! 🥺", sub: "Come on, give me a chance!" },
    { msg: "Pleeeease forgive me! 😭", sub: "I promise I'll do better!" },
    { msg: "I'm literally begging now 🙏", sub: "The 'No' button is tired too..." },
    { msg: "Okay this is getting ridiculous 😅", sub: "Just click yes already!" }
  ];

  let dodgeCount = 0;
  let yesScale = 1;

  function moveNoButton() {
    const containerRect = buttonsRow.getBoundingClientRect();
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const maxX = containerRect.width - btnWidth;
    const maxY = containerRect.height - btnHeight;

    const randX = Math.random() * Math.max(maxX, 40) - maxX / 2;
    const randY = (Math.random() - 0.5) * Math.max(maxY, 20);

    noBtn.style.transform = `translate(${randX}px, ${randY}px)`;
  }

  function dodge() {
    dodgeCount++;
    moveNoButton();

    noBtn.textContent = taunts[Math.min(dodgeCount - 1, taunts.length - 1)];

    const shrink = Math.max(0.5, 1 - dodgeCount * 0.06);
    noBtn.style.fontSize = (16 * shrink) + 'px';
    noBtn.style.padding = (16 * shrink) + 'px ' + (32 * shrink) + 'px';
    noBtn.style.opacity = Math.max(0.4, 1 - dodgeCount * 0.05);

    yesScale = Math.min(1.6, 1 + dodgeCount * 0.05);
    yesBtn.style.transform = `scale(${yesScale})`;

    const stage = Math.min(Math.floor(dodgeCount / 2), escalatingMessages.length - 1);
    message.textContent = escalatingMessages[stage].msg;
    submessage.textContent = escalatingMessages[stage].sub;
  }

  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('click', (e) => {
    e.preventDefault();
    dodge();
  });
  noBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    dodge();
  });

  // Yes button - notify via Formspree
  const status = document.getElementById('status');
  const mainContent = document.getElementById('mainContent');
  const successScreen = document.getElementById('successScreen');

  yesBtn.addEventListener('click', async () => {
    status.textContent = "Sending... 💌";
    status.style.color = '#888';
    yesBtn.style.opacity = '0.7';

    const payload = {
      message: "They clicked 'I forgive you'! 💖",
      timestamp: new Date().toLocaleString(),
      dodgeAttempts: dodgeCount
    };

    try {
      const response = await fetch(FORMSPREE_ENDPOINT, {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json().catch(() => null);

      if (response.ok) {
        status.textContent = "Sent! 💌";
        mainContent.style.display = 'none';
        successScreen.classList.add('show');
      } else {
        const errMsg = (data && data.errors && data.errors[0] && data.errors[0].message)
          ? data.errors[0].message
          : 'Status ' + response.status;
        status.textContent = "Notification failed: " + errMsg;
        status.style.color = '#d6336c';
        yesBtn.style.opacity = '1';
      }
    } catch (err) {
      status.textContent = "Network error: " + err.message;
      status.style.color = '#d6336c';
      yesBtn.style.opacity = '1';
    }
  });
</script>

</body>
</html>
